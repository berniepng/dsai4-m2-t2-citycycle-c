# orchestration/workspace.yaml
# ==============================
# Dagster workspace definition.
# Tells Dagster where to find the pipeline code.
#
# Start the Dagster UI:
#   dagster dev -f orchestration/workspace.yaml
#
# Or with the full workspace:
#   cd orchestration && dagster dev

load_from:
  - python_file:
      relative_path: assets/ingestion_assets.py
      working_directory: ..
      executable_path: python

  - python_file:
      relative_path: assets/transform_assets.py
      working_directory: ..
      executable_path: python

  - python_file:
      relative_path: assets/quality_assets.py
      working_directory: ..
      executable_path: python

  - python_file:
      relative_path: jobs/citycycle_pipeline_job.py
      working_directory: ..
      executable_path: python
